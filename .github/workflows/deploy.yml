name: Deploy React Portfolio to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Update Google Scholar citations
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: npm run update:scholar

    - name: Commit Google Scholar citation updates
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: |
        if [[ -n "$(git status --porcelain src/data/scholarCitations.ts)" ]]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/scholarCitations.ts
          git commit -m "chore: update Google Scholar citations [skip ci]"
          git push
        else
          echo "No Google Scholar citation changes."
        fi
      
    - name: Build React app
      run: npm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
